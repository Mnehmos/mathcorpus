name = "MathCorpus"
defaultTargets = ["MathCorpus"]

# Pin mathlib to match `lean-toolchain`. Update both together when bumping the toolchain,
# and record the exact revision in each packet's `toolchain.mathlib_rev`.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.15.0"

[[lean_lib]]
name = "MathCorpus"
