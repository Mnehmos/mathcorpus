name: MathCorpus CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  corpus:
    name: Validate corpus (schema · hashes · policy · redaction)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: python -m pip install -r tools/requirements.txt

      - name: Hashes are stamped and current
        run: python tools/stamp_hashes.py --check packets/

      - name: Schema + policy validation (warnings fail CI)
        run: python tools/validate_packets.py packets/ --check-hashes --warn-as-error

      - name: MCIP conformance fixtures (schema + hashes)
        run: python tools/validate_mcip.py schema/mcip/v1/fixtures/ --check-hashes --warn-as-error

      - name: MCIP import dry-run against real packets (issue #6)
        run: python tools/import_mcip.py schema/mcip/v1/fixtures/ --packets-dir packets/

      - name: MCIP golden path — real proof-search bundle folds cleanly + idempotently (#264)
        run: python tools/test_mcip_golden_path.py

      - name: Build manifests
        run: |
          python tools/build_manifests.py packets/ --out manifests/
          python tools/build_split_manifest.py packets/ --out manifests/split_manifest.json
          python tools/dedupe_pipeline.py packets/ --out manifests/dedupe_clusters.json
          python tools/backfill_report.py packets/ --out manifests/backfill_report.json

      - name: Committed manifests are current (regeneration must be a no-op)
        run: git diff --exit-code -- manifests/

      - name: Build public exports
        run: python tools/export_jsonl.py packets/ --out exports/

      - name: Redaction audit (fail-closed)
        run: python tools/redaction_audit.py packets/ exports/

  lean:
    name: Lean kernel check (changed modules)
    runs-on: ubuntu-latest
    # Kernel-checks every Lean module the PR adds or changes, against the pinned
    # toolchain + Mathlib cache. A full `lake build MathCorpus` of all ~380
    # modules costs many hours per run (each module pays the full Mathlib import);
    # run that as a scheduled/nightly job once corpus-olean caching is set up.
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Lean modules
        id: changed
        run: |
          git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}"...HEAD -- 'lean/MathCorpus/**/*.lean' > changed_lean.txt
          echo "count=$(wc -l < changed_lean.txt)" >> "$GITHUB_OUTPUT"
          cat changed_lean.txt

      - name: Install elan
        if: steps.changed.outputs.count != '0'
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch Mathlib cache
        if: steps.changed.outputs.count != '0'
        working-directory: lean
        run: |
          lake exe cache get

      - name: Kernel-check changed modules (dependencies first)
        if: steps.changed.outputs.count != '0'
        working-directory: lean
        run: |
          # Build each changed module through lake so intra-corpus imports
          # (dependency packets) are built and kernel-checked first.
          while IFS= read -r f; do
            mod=$(echo "${f#lean/}" | sed 's/\.lean$//; s/\//./g')
            echo "::group::lake build $mod"
            lake build "$mod"
            echo "::endgroup::"
          done < ../changed_lean.txt
